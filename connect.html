<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartSync - Kết nối cặp đôi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #ff4d6a;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .logo p {
            color: #666;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .tab.active {
            background: white;
            color: #ff4d6a;
            box-shadow: 0 2px 10px rgba(255,77,106,0.2);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff4d6a;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff758c, #ff4d6a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,77,106,0.3);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .code-display {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
        }
        .code-display .code {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff4d6a;
            letter-spacing: 8px;
            margin: 10px 0;
        }
        .code-display p {
            color: #666;
            font-size: 0.85rem;
        }
        .status {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .status.loading {
            background: #fff3e0;
            color: #e65100;
            display: block;
        }
        .info-box {
            background: #fff5f7;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
        }
        .info-box strong {
            color: #ff4d6a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>❤️ HeartSync</h1>
            <p>Kết nối hai trái tim</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('create')">Tạo cặp đôi</div>
            <div class="tab" onclick="switchTab('join')">Tham gia</div>
        </div>

        <!-- Create Couple -->
        <div id="create-form">
            <div class="form-group">
                <label>Tên của bạn</label>
                <input type="text" id="create-name" placeholder="Nhập tên bạn...">
            </div>
            <div class="form-group">
                <label>Tên người yêu</label>
                <input type="text" id="create-partner" placeholder="Nhập tên người yêu...">
            </div>
            <button class="btn" onclick="createCouple()">Tạo cặp đôi</button>
            
            <div id="create-result"></div>
        </div>

        <!-- Join Couple -->
        <div id="join-form" style="display: none;">
            <div class="form-group">
                <label>Tên của bạn</label>
                <input type="text" id="join-name" placeholder="Nhập tên bạn...">
            </div>
            <div class="form-group">
                <label>Mã cặp đôi</label>
                <input type="text" id="join-code" placeholder="Nhập mã 6 ký tự..." style="text-transform: uppercase; letter-spacing: 4px; text-align: center; font-weight: 700;">
            </div>
            <button class="btn" onclick="joinCouple()">Tham gia</button>
            
            <div id="join-result"></div>
        </div>

        <div class="info-box">
            <strong>Cách hoạt động:</strong><br>
            • Tạo cặp đôi để nhận mã chia sẻ với bạn gái<br>
            • Bạn gái dùng mã này để tham gia<br>
            • Cả hai sẽ đồng bộ dữ liệu real-time
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentTab = 'create';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById('create-form').style.display = tab === 'create' ? 'block' : 'none';
            document.getElementById('join-form').style.display = tab === 'join' ? 'block' : 'none';
        }

        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function createCouple() {
            const name = document.getElementById('create-name').value.trim();
            const partner = document.getElementById('create-partner').value.trim();
            
            if (!name || !partner) {
                showStatus('create-result', 'Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            showStatus('create-result', 'Đang tạo cặp đôi...', 'loading');

            socket.emit('createCouple', { userName: name, partnerName: partner }, (response) => {
                if (response.success) {
                    localStorage.setItem('heartsync_couple_code', response.coupleCode);
                    localStorage.setItem('heartsync_user_name', name);
                    localStorage.setItem('heartsync_user_role', response.role);
                    
                    document.getElementById('create-result').innerHTML = `
                        <div class="code-display">
                            <p>Mã cặp đôi của bạn:</p>
                            <div class="code">${response.coupleCode}</div>
                            <p>Gửi mã này cho ${partner} để tham gia nhé!</p>
                            <button class="btn" style="margin-top: 15px;" onclick="openApp()">Vào app ngay</button>
                        </div>
                    `;
                } else {
                    showStatus('create-result', response.error || 'Lỗi tạo cặp đôi', 'error');
                }
            });
        }

        function joinCouple() {
            const name = document.getElementById('join-name').value.trim();
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            
            if (!name || !code) {
                showStatus('join-result', 'Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            showStatus('join-result', 'Đang tham gia...', 'loading');

            socket.emit('joinCouple', { coupleCode: code, userName: name }, (response) => {
                if (response.success) {
                    localStorage.setItem('heartsync_couple_code', response.coupleCode);
                    localStorage.setItem('heartsync_user_name', name);
                    localStorage.setItem('heartsync_user_role', response.role);
                    
                    showStatus('join-result', `✅ Tham gia thành công! Chào mừng ${name}!`, 'success');
                    setTimeout(() => openApp(), 1500);
                } else {
                    showStatus('join-result', response.error || 'Lỗi tham gia cặp đôi', 'error');
                }
            });
        }

        function openApp() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
